name: Build pico-launcher

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    name: Build LAUNCHER.nds with BlocksDS
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/blocksds/sdk:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        run: make

      - name: Prepare artifact folder
        run: |
          mkdir -p "build lista"
          cp LAUNCHER.nds "build lista/LAUNCHER.nds"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build lista
          path: "build lista/"
